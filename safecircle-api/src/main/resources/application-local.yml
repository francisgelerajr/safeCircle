# LOCAL DEVELOPMENT PROFILE
# Active when: SPRING_PROFILES_ACTIVE=local (set in docker-compose or your IDE run config)
#
# Points to services running on your laptop via docker-compose.
# These are NOT real AWS services — docker-compose runs local equivalents.

spring:
  datasource:
    url: jdbc:postgresql://localhost:5432/safecircle_dev
    username: safecircle
    password: safecircle_dev_password  # fine to commit — this is dev-only, no real data
    driver-class-name: org.postgresql.Driver

  data:
    redis:
      host: localhost
      port: 6379
      # No password in local dev

  jpa:
    # In local dev, show SQL so you can see exactly what queries are running
    show-sql: true
    properties:
      hibernate:
        format_sql: true

# LocalStack simulates AWS SQS locally — no real AWS account needed for development
spring.cloud.aws:
  region:
    static: ap-southeast-1
  credentials:
    access-key: test       # LocalStack accepts any key
    secret-key: test
  sqs:
    endpoint: http://localhost:4566  # LocalStack endpoint

# Use a fake JWKS in local dev — the security filter will be relaxed
safecircle:
  cognito:
    jwks-uri: http://localhost:4566/  # override with a test value
  heartbeat:
    ping-interval-minutes: 5  # shorter interval in dev so you can see it working

# Show all log levels in local dev
logging:
  level:
    com.safecircle: DEBUG
    org.springframework.security: DEBUG
    org.hibernate.SQL: DEBUG