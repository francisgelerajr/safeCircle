spring:
  application:
    name: safecircle-worker

  # NO embedded web server — the worker only listens to SQS
  main:
    web-application-type: none

  jpa:
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        default_batch_fetch_size: 20
    open-in-view: false

  flyway:
    # The API module owns the schema — the worker should NOT run migrations.
    # If both run at the same time during deployment, they'd race each other.
    enabled: false

  jackson:
    serialization:
      write-dates-as-timestamps: false
    deserialization:
      fail-on-unknown-properties: false

# Actuator health for ECS — worker needs this even without a web server.
# Spring Boot auto-configures a minimal HTTP server just for actuator
# when web-application-type=none but actuator is on the classpath.
management:
  server:
    port: 8081
  endpoints:
    web:
      exposure:
        include: health

safecircle:
  sqs:
    notification-queue-name: safecircle-notifications
  fcm:
    server-key: ${FCM_SERVER_KEY:}
  twilio:
    account-sid: ${TWILIO_ACCOUNT_SID:}
    auth-token: ${TWILIO_AUTH_TOKEN:}
    from-number: ${TWILIO_FROM_NUMBER:}